<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ff7ca8">
    <meta name="description" content="Nina - um jogo virtual em homenagem a uma gatinha preta e branca de olhos verdes.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <title>Cozinha da Nina</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="cozinha">
<div class="app-shell">
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-paw">🐾</span>
            <span>
                <strong>Nina</strong>
                <small>Meu Gatinho</small>
            </span>
        </a>
        <div class="top-stats">
            <div class="top-chip">⭐ Nível <span data-level>1</span></div>
            <div class="top-chip">🪙 <span data-coins>250</span></div>
        </div>
    </header>

    <nav class="room-nav" aria-label="Cômodos">
        <a data-route="inicio" href="index.html">🏠<span>Início</span></a>
        <a data-route="cozinha" href="cozinha.html">🍽️<span>Cozinha</span></a>
        <a data-route="quarto" href="quarto.html">🛏️<span>Quarto</span></a>
        <a data-route="banheiro" href="banheiro.html">🛁<span>Banheiro</span></a>
        <a data-route="jogo" href="jogo.html">🎮<span>Jogo</span></a>
        <a data-route="loja" href="loja.html">🛍️<span>Loja</span></a>
    </nav>
    <main class="page">
<section class="room-page kitchen-page">
    <div class="room-heading"><div><p>Cômodo</p><h1>Cozinha</h1></div><a href="index.html" class="back-link">← Voltar para Nina</a></div>
    <div class="room-layout">
        <div class="scene kitchen-scene"><div class="fridge">❄️<span>Geladeira</span></div><div class="counter">🥣</div>
<div class="cat-wrap" id="ninaCat" role="img" aria-label="Nina, uma gatinha preta e branca de olhos verdes">
    <div class="tail"></div>
    <div class="cat">
        <div class="ear ear-left"><span></span></div>
        <div class="ear ear-right"><span></span></div>
        <div class="face">
            <div class="patch"></div>
            <div class="eye eye-left"><i></i></div>
            <div class="eye eye-right"><i></i></div>
            <div class="nose"></div>
            <div class="mouth"></div>
            <div class="whiskers whiskers-left"></div>
            <div class="whiskers whiskers-right"></div>
        </div>
        <div class="body">
            <div class="heart-mark">♥</div>
            <div class="paw paw-left"></div>
            <div class="paw paw-right"></div>
        </div>
    </div>
    <div class="speech" id="speech">Miau! 💚</div>
</div>
</div>
        <div class="inventory-panel">
            <h2>Escolha uma comida</h2><p>Alimente a Nina e ganhe experiência.</p>
            <div class="shop-grid">
                <button class="item-card food-item" data-food="Ração" data-price="0" data-points="12"><span>🥣</span><b>Ração</b><small>+12 fome</small></button>
                <button class="item-card food-item" data-food="Peixe" data-price="15" data-points="20"><span>🐟</span><b>Peixe</b><small>15 moedas</small></button>
                <button class="item-card food-item" data-food="Frango" data-price="22" data-points="28"><span>🍗</span><b>Frango</b><small>22 moedas</small></button>
                <button class="item-card food-item" data-food="Salmão" data-price="35" data-points="40"><span>🍣</span><b>Salmão</b><small>35 moedas</small></button>
            </div>
        </div>
    </div>
</section>    </main>
</div>

<nav class="mobile-tabs" aria-label="Navegação móvel">
    <a data-route="inicio" href="index.html">🏠<span>Início</span></a>
    <a data-route="cozinha" href="cozinha.html">🍽️<span>Cozinha</span></a>
    <a data-route="quarto" href="quarto.html">🛏️<span>Quarto</span></a>
    <a data-route="banheiro" href="banheiro.html">🛁<span>Banho</span></a>
    <a data-route="jogo" href="jogo.html">🎮<span>Jogo</span></a>
    <a data-route="loja" href="loja.html">🛍️<span>Loja</span></a>
</nav>

<div id="toast" class="toast" aria-live="polite"></div>
<script src="assets/js/game.js"></script>
</body>
</html>
