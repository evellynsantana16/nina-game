<!DOCTYPE html>

<body data-page="jogo">
<div class="app-shell">
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-paw">🐾</span>
            <span>
                <strong>Nina</strong>
                <small>Meu Gatinho</small>
            </span>
        </a>
        <div class="top-stats">
            <div class="top-chip">⭐ Nível <span data-level>1</span></div>
            <div class="top-chip">🪙 <span data-coins>250</span></div>
        </div>
    </header>

    <nav class="room-nav" aria-label="Cômodos">
        <a data-route="inicio" href="index.html">🏠<span>Início</span></a>
        <a data-route="cozinha" href="cozinha.html">🍽️<span>Cozinha</span></a>

        <a data-route="loja" href="loja.html">🛍️<span>Loja</span></a>
    </nav>
    <main class="page">
<section class="room-page game-page">
    <div class="room-heading"><div><p>Minijogo</p><h1>Caça ao Ratinho</h1></div><a href="index.html" class="back-link">← Voltar para Nina</a></div>
    <div class="minigame-card">
        <div class="minigame-stats"><span>⏱️ Tempo: <b id="gameTime">20</b>s</span><span>🐭 Pontos: <b id="gameScore">0</b></span><span>🪙 Prêmio: <b id="gamePrize">0</b></span></div>
        <div class="mouse-field" id="mouseField"><button type="button" id="mouseTarget" aria-label="Ratinho">🐭</button><div class="game-overlay" id="gameOverlay"><h2>Ajude a Nina!</h2><p>Clique no ratinho o máximo que conseguir.</p><button type="button" class="primary-big" id="startGame">Começar</button></div></div>
    </div>
</section>    </main>
</div>
