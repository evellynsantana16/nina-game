<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ff7ca8">
    <meta name="description" content="Nina - um jogo virtual em homenagem a uma gatinha preta e branca de olhos verdes.">
    <title>Banheiro da Nina</title>
    <link rel="stylesheet" href="./style.css?v=3">
</head>
<body data-page="banheiro">
<div class="app-shell">
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-paw">🐾</span>
            <span>
                <strong>Nina</strong>
                <small>Meu Gatinho</small>
            </span>
        </a>
        <div class="top-stats">
            <div class="top-chip">⭐ Nível <span data-level>1</span></div>
            <div class="top-chip">🪙 <span data-coins>250</span></div>
        </div>
    </header>

    <nav class="room-nav" aria-label="Cômodos">
        <a data-route="inicio" href="index.html">🏠<span>Início</span></a>
        <a data-route="cozinha" href="cozinha.html">🍽️<span>Cozinha</span></a>
        <a data-route="quarto" href="quarto.html">🛏️<span>Quarto</span></a>
        <a data-route="banheiro" href="banheiro.html">🛁<span>Banheiro</span></a>
        <a data-route="jogo" href="jogo.html">🎮<span>Jogo</span></a>
        <a data-route="loja" href="loja.html">🛍️<span>Loja</span></a>
    </nav>
    <main class="page">
<section class="room-page bathroom-page">
    <div class="room-heading"><div><p>Cômodo</p><h1>Banheiro</h1></div><a href="index.html" class="back-link">← Voltar para Nina</a></div>
    <div class="room-layout">
        <div class="scene bathroom-scene"><div class="bath">🛁</div><div class="bubble b1">○</div><div class="bubble b2">○</div><div class="bubble b3">○</div>
<div class="cat-wrap" id="ninaCat" role="img" aria-label="Nina, uma gatinha preta e branca de olhos verdes">
    <div class="tail"></div>
    <div class="cat">
        <div class="ear ear-left"><span></span></div>
        <div class="ear ear-right"><span></span></div>
        <div class="face">
            <div class="patch"></div>
            <div class="eye eye-left"><i></i></div>
            <div class="eye eye-right"><i></i></div>
            <div class="nose"></div>
            <div class="mouth"></div>
            <div class="whiskers whiskers-left"></div>
            <div class="whiskers whiskers-right"></div>
        </div>
        <div class="body">
            <div class="heart-mark">♥</div>
            <div class="paw paw-left"></div>
            <div class="paw paw-right"></div>
        </div>
    </div>
    <div class="speech" id="speech">Miau! 💚</div>
</div>
</div>
        <div class="inventory-panel"><h2>Banho da Nina</h2><p>Clique várias vezes na esponja para encher a barra de limpeza.</p><div class="bath-progress"><i id="bathFill"></i></div><button type="button" class="primary-big" id="spongeButton">🧽 Passar esponja</button><div class="room-message" id="bathMessage">A Nina está esperando o banho.</div></div>
    </div>
</section>    </main>
</div>

<nav class="mobile-tabs" aria-label="Navegação móvel">
    <a data-route="inicio" href="index.html">🏠<span>Início</span></a>
    <a data-route="cozinha" href="cozinha.html">🍽️<span>Cozinha</span></a>
    <a data-route="quarto" href="quarto.html">🛏️<span>Quarto</span></a>
    <a data-route="banheiro" href="banheiro.html">🛁<span>Banho</span></a>
    <a data-route="jogo" href="jogo.html">🎮<span>Jogo</span></a>
    <a data-route="loja" href="loja.html">🛍️<span>Loja</span></a>
</nav>

<div id="toast" class="toast" aria-live="polite"></div>
<script src="./game.js?v=3"></script>
</body>
</html>
